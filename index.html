<!DOCTYPE html>
<html>
<head>
  <title>Exam App</title>

  <style>
    body { margin:0; font-family: Arial; background:#87CEEB; }
    #login,#dashboard { padding:20px; }
    #login {
      max-width:300px; margin:100px auto; background:white;
      padding:20px; border-radius:10px; text-align:center;
    }
    input,textarea,select {
      width:90%; padding:10px; margin:5px;
      border-radius:5px; border:1px solid #ccc;
    }
    button {
      padding:10px; width:95%; background:#007BFF;
      color:white; border:none; border-radius:5px;
      cursor:pointer;
    }
    button:hover { background:#0056b3; }
    #dashboard { display:none; }
    .sidebar {
      width:220px; height:100vh; background:white;
      position:fixed; padding:10px;
    }
    .content {
      margin-left:240px; padding:20px;
      background:white; min-height:100vh;
      border-radius:10px;
    }
    .card {
      border:1px solid #ccc; padding:10px;
      margin:5px; border-radius:5px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>School Login</h2>
  <input type="text" id="school" placeholder="School Name (Register only)" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="sidebar">
    <h3>Exam App</h3>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('question')">Question Bank</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">

    <div id="home">
      <h2>Welcome 🎉</h2>
    </div>

    <div id="question" style="display:none;">
      <h2>Question Bank</h2>

      <input type="text" id="class" placeholder="Class" />
      <input type="text" id="subject" placeholder="Subject" />
      <input type="text" id="chapter" placeholder="Chapter" />

      <!-- TYPE -->
      <select id="type">
        <option value="MCQ">MCQ</option>
        <option value="SHORT">Short Answer</option>
        <option value="LONG">Long Answer</option>
        <option value="TRUE_FALSE">True / False</option>
        <option value="MATCH">Match the Column</option>
      </select>

      <textarea id="questionText" placeholder="Enter Question"></textarea>

      <!-- MCQ -->
      <div id="mcqBox">
        <input type="text" id="optA" placeholder="Option A" />
        <input type="text" id="optB" placeholder="Option B" />
        <input type="text" id="optC" placeholder="Option C" />
        <input type="text" id="optD" placeholder="Option D" />
      </div>

      <!-- MATCH COLUMN -->
      <div id="matchBox" style="display:none;">
        <h4>Column A</h4>
        <input type="text" id="colA1" placeholder="A1" />
        <input type="text" id="colA2" placeholder="A2" />
        <input type="text" id="colA3" placeholder="A3" />

        <h4>Column B</h4>
        <input type="text" id="colB1" placeholder="B1" />
        <input type="text" id="colB2" placeholder="B2" />
        <input type="text" id="colB3" placeholder="B3" />
      </div>

      <input type="text" id="correctAnswer" placeholder="Correct Answer" />
      <input type="number" id="marks" placeholder="Marks" />

      <!-- OCR -->
      <input type="file" id="imageInput" />
      <button onclick="uploadImage()">Scan Image 📷</button>

      <button onclick="addQuestion()">Save Question</button>

      <h3>Saved Questions</h3>
      <div id="questionList"></div>
    </div>

  </div>
</div>

<script>

const BASE_URL = "https://exam-backend-cu62.onrender.com";
let editId = null;

window.onload = () => {
  const token = localStorage.getItem("token");
  if (token) {
    loginUI();
    loadQuestions();
  }
};

// TYPE SWITCH UI
type.addEventListener("change", ()=>{
  mcqBox.style.display = type.value==="MCQ" ? "block":"none";
  matchBox.style.display = type.value==="MATCH" ? "block":"none";
});

// LOGIN UI
function loginUI(){
  login.style.display="none";
  dashboard.style.display="block";
}

// REGISTER
async function register(){
  const res=await fetch(`${BASE_URL}/register`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      schoolName:school.value,
      email:email.value,
      password:password.value
    })
  });
  const data=await res.json();
  msg.innerText=data.message;
}

// LOGIN
async function login(){
  const res=await fetch(`${BASE_URL}/login`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });
  const data=await res.json();
  if(data.token){
    localStorage.setItem("token",data.token);
    loginUI();
    loadQuestions();
  } else msg.innerText=data.message;
}

// LOGOUT
function logout(){
  localStorage.removeItem("token");
  location.reload();
}

// ADD
async function addQuestion(){
  const token=localStorage.getItem("token");

  let options={};

  if(type.value==="MCQ"){
    options={
      A:optA.value,
      B:optB.value,
      C:optC.value,
      D:optD.value
    };
  }

  if(type.value==="MATCH"){
    options={
      colA:[colA1.value,colA2.value,colA3.value],
      colB:[colB1.value,colB2.value,colB3.value]
    };
  }

  const q={
    cls:class.value,
    subject:subject.value,
    chapter:chapter.value,
    text:questionText.value,
    marks:marks.value,
    type:type.value,
    options,
    correctAnswer:correctAnswer.value
  };

  const url=editId?`/update-question/${editId}`:"/add-question";
  const method=editId?"PUT":"POST";

  await fetch(BASE_URL+url,{
    method,
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify(q)
  });

  alert(editId?"Updated":"Saved");
  editId=null;
  clearForm();
  loadQuestions();
}

// LOAD
async function loadQuestions(){
  const token=localStorage.getItem("token");

  const res=await fetch(`${BASE_URL}/questions`,{
    headers:{ "Authorization":"Bearer "+token }
  });

  const data=await res.json();
  questionList.innerHTML="";

  data.forEach(q=>{
    questionList.innerHTML+=`
    <div class="card">
      <b>${q.cls} | ${q.subject} | ${q.type}</b><br>
      ${q.text}<br>
      ${q.type==="MCQ" ? `
        A.${q.options?.A||""}<br>
        B.${q.options?.B||""}<br>
        C.${q.options?.C||""}<br>
        D.${q.options?.D||""}<br>` : ""}

      ${q.type==="MATCH" ? `
        Column A: ${q.options?.colA?.join(", ")}<br>
        Column B: ${q.options?.colB?.join(", ")}<br>` : ""}

      ✅ Answer: ${q.correctAnswer||""}<br><br>

      <button onclick="deleteQuestion('${q._id}')">Delete</button>
    </div>`;
  });
}

// DELETE
async function deleteQuestion(id){
  const token=localStorage.getItem("token");
  await fetch(`${BASE_URL}/delete-question/${id}`,{
    method:"DELETE",
    headers:{ "Authorization":"Bearer "+token }
  });
  loadQuestions();
}

// OCR
async function uploadImage(){
  const file=imageInput.files[0];
  const token=localStorage.getItem("token");

  const fd=new FormData();
  fd.append("image",file);

  const res=await fetch(`${BASE_URL}/ocr`,{
    method:"POST",
    headers:{ "Authorization":"Bearer "+token },
    body:fd
  });

  const data=await res.json();
  questionText.value=data.text;
}

// CLEAR
function clearForm(){
  class.value="";
  subject.value="";
  chapter.value="";
  questionText.value="";
  correctAnswer.value="";
  marks.value="";
}

</script>

</body>
</html>
