<!DOCTYPE html>
<html>
<head>
  <title>OCR App</title>
</head>
<body>

<h2>Handwriting to Text</h2>

<input type="file" id="fileInput" />
<br><br>

<button onclick="uploadFile()">Convert</button>

<br><br>

<textarea id="output" rows="10" cols="40"></textarea>

<script>
async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Please select a file");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch("https://https://exam-backend-cu62.onrender.com/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    document.getElementById("output").value = data.text;
  } catch (error) {
    alert("Error connecting to server");
    console.log(error);
  }
}
</script>

</body>
</html>
