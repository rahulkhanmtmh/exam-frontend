<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Exam App · Modern UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- AUTH SECTION -->
<div id="login">
  <div class="auth-card">
    <div class="tab-bar">
      <button class="tab-btn active" id="signinTabBtn"><i class="fas fa-sign-in-alt"></i> Sign in</button>
      <button class="tab-btn" id="signupTabBtn"><i class="fas fa-user-plus"></i> Create account</button>
    </div>

    <div id="signinFormContainer">
      <div class="form-title">Welcome back</div>
      <form id="signinForm">
        <div class="input-group">
          <label>Email</label>
          <input type="email" class="input-field" id="signinEmail" placeholder="teacher@school.com" autocomplete="off">
        </div>
        <div class="input-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" class="input-field" id="signinPassword" autocomplete="off">
            <i class="far fa-eye-slash toggle-password" data-target="signinPassword"></i>
          </div>
        </div>
        <button type="submit" class="submit-btn">Sign in</button>
      </form>
      <div id="msg" class="error-msg"></div>
    </div>

    <div id="signupFormContainer" class="form-hidden">
      <div class="form-title">Create account</div>
      <form id="signupForm">
        <div class="input-group">
          <label>School name</label>
          <input type="text" class="input-field" id="signupSchool" autocomplete="off">
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" class="input-field" id="signupEmail" autocomplete="off">
        </div>
        <div class="input-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" class="input-field" id="signupPassword" autocomplete="off">
            <i class="far fa-eye-slash toggle-password" data-target="signupPassword"></i>
          </div>
        </div>
        <div class="input-group">
          <label>Confirm password</label>
          <div class="password-wrapper">
            <input type="password" class="input-field" id="signupConfirmPassword" autocomplete="off">
            <i class="far fa-eye-slash toggle-password" data-target="signupConfirmPassword"></i>
          </div>
        </div>
        <button type="submit" class="submit-btn">Sign up</button>
      </form>
      <div id="signupMsg" class="error-msg"></div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <div class="logo">
      <button class="three-dot-icon" id="topThreeDotBtn"><i class="fas fa-ellipsis-v"></i></button>
      <h2><i class="fas fa-graduation-cap"></i> Exam App</h2>
    </div>
    <div class="nav-links">
      <a href="#" id="homeLink"><i class="fas fa-home"></i><span> Home</span></a>
      <a href="#" id="addLink"><i class="fas fa-plus-circle"></i><span> Add</span></a>
      <a href="#" id="listLink"><i class="fas fa-list-ul"></i><span> My Qs</span></a>
      <button id="themeTopBtn"><i class="fas fa-moon"></i><span> Theme</span></button>
      <button id="logoutTopBtn"><i class="fas fa-sign-out-alt"></i><span> Logout</span></button>
    </div>
  </div>

  <button class="mobile-menu-toggle" id="mobileMenuToggle">
    <i class="fas fa-bars"></i>
  </button>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3><i class="fas fa-graduation-cap"></i> <span>Exam App</span></h3>
      <button class="toggle-sidebar-btn" id="toggleSidebarBtn"><i class="fas fa-bars"></i></button>
    </div>
    <div class="nav-buttons">
      <button id="homeSidebarBtn"><i class="fas fa-home"></i> <span>Home</span></button>
      <button id="addSidebarBtn"><i class="fas fa-plus-circle"></i> <span>Add Question</span></button>
      <button id="listSidebarBtn"><i class="fas fa-list-ul"></i> <span>My Questions</span></button>
      <button id="logoutSidebarBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button>
    </div>
    <div class="dropdown-container">
      <button class="three-dot-btn" id="threeDotBtn"><i class="fas fa-ellipsis-h"></i> <span>More</span></button>
      <div class="dropdown-menu" id="dropdownMenu">
        <button id="themeDropdownBtn"><i class="fas fa-moon"></i> Dark mode</button>
        <button id="helpBtn"><i class="fas fa-question-circle"></i> Help</button>
        <button id="profileBtn"><i class="fas fa-user-cog"></i> Profile</button>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <div id="home">
      <h2>📚 Welcome to Exam Portal</h2>
      <p>Manage your question bank, add new questions, and view saved ones.</p>
    </div>

    <!-- ADD QUESTION SECTION (with bulk import) -->
    <div id="addQuestionSection" style="display:none;">
      <h2><i class="fas fa-plus-circle"></i> Add / Edit Question</h2>

      <div id="singleQuestionForm">
        <input type="text" id="class" placeholder="Class">
        <input type="text" id="subject" placeholder="Subject">
        <input type="text" id="chapter" placeholder="Chapter">

        <select id="type">
          <option value="MCQ">MCQ</option>
          <option value="SHORT">Short Answer</option>
          <option value="LONG">Long Answer</option>
          <option value="TRUE_FALSE">True / False</option>
          <option value="MATCH">Match the Column</option>
        </select>

        <textarea id="questionText" placeholder="Enter your question here..."></textarea>

        <div id="mcqBox">
          <input type="text" id="optA" placeholder="Option A">
          <input type="text" id="optB" placeholder="Option B">
          <input type="text" id="optC" placeholder="Option C">
          <input type="text" id="optD" placeholder="Option D">
        </div>

        <div id="matchBox" style="display:none;">
          <h4>Column A</h4>
          <input type="text" id="colA1" placeholder="A1">
          <input type="text" id="colA2" placeholder="A2">
          <input type="text" id="colA3" placeholder="A3">
          <h4>Column B</h4>
          <input type="text" id="colB1" placeholder="B1">
          <input type="text" id="colB2" placeholder="B2">
          <input type="text" id="colB3" placeholder="B3">
        </div>

        <input type="text" id="correctAnswer" placeholder="Correct Answer">
        <input type="number" id="marks" placeholder="Marks">

        <input type="file" id="imageInput" accept="image/*">
        <button id="scanImageBtn"><i class="fas fa-camera"></i> Scan Image</button>

        <div class="flex-buttons">
          <button id="saveQuestionBtn">Save Question</button>
          <button id="clearFormBtn">Clear</button>
        </div>
      </div>

      <!-- Bulk Import Section -->
      <div class="bulk-section">
        <label class="bulk-toggle">
          <input type="checkbox" id="bulkModeCheckbox"> <i class="fas fa-layer-group"></i> Bulk Import (paste multiple questions)
        </label>
        <div id="bulkArea" style="display: none;">
          <textarea id="bulkQuestions" class="bulk-textarea" placeholder="Enter questions separated by new lines OR by slashes ( / )&#10;Example (lines):&#10;What is the capital of France?&#10;Solve for x: 2x + 5 = 15&#10;&#10;Example (slash):&#10;What is 2+2? / What is the capital of Japan? / Define Newton's first law"></textarea>
          <div class="bulk-actions">
            <button id="bulkAddBtn"><i class="fas fa-plus-circle"></i> Add Bulk Questions</button>
            <button id="clearBulkBtn">Clear</button>
          </div>
          <div id="bulkStatus" class="error-msg" style="display: none;"></div>
        </div>
      </div>
    </div>

    <!-- My Questions Section -->
    <div id="myQuestionsSection" style="display:none;">
      <h2><i class="fas fa-database"></i> My Questions</h2>
      <div id="questionList"></div>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
