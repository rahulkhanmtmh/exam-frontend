<!DOCTYPE html>
<html>
<head>
  <title>Exam App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #87CEEB;
    }

    #login, #dashboard {
      padding: 20px;
    }

    #login {
      max-width: 300px;
      margin: 100px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      width: 95%;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #dashboard {
      display: none;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: white;
      position: fixed;
      padding: 10px;
    }

    .content {
      margin-left: 240px;
      padding: 20px;
      background: white;
      min-height: 100vh;
      border-radius: 10px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>School Login</h2>
  <input type="email" id="email" placeholder="Enter Email" />
  <input type="password" id="password" placeholder="Enter Password" />
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="sidebar">
    <h3>Exam App</h3>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('question')">Question Bank</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">

    <div id="home">
      <h2>Welcome 🎉</h2>
    </div>

    <div id="question" style="display:none;">
      <h2>Question Bank</h2>

      <input type="text" id="class" placeholder="Class" />
      <input type="text" id="subject" placeholder="Subject" />
      <input type="text" id="chapter" placeholder="Chapter" />

      <textarea id="questionText" placeholder="Enter Question"></textarea>
      <input type="number" id="marks" placeholder="Marks" />

      <button onclick="addQuestion()">Save Question</button>

      <h3>Saved Questions</h3>
      <div id="questionList"></div>
    </div>

  </div>

</div>

<script>

const BASE_URL = "https://exam-backend-cu62.onrender.com";

let editId = null;

// LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (email === "admin@test.com" && password === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    document.getElementById("msg").innerText = "Invalid login ❌";
  }
}

function logout() {
  location.reload();
}

// PAGE SWITCH
function showPage(page) {
  document.getElementById("home").style.display = "none";
  document.getElementById("question").style.display = "none";

  document.getElementById(page).style.display = "block";

  if (page === "question") loadQuestions();
}

// ADD / UPDATE
async function addQuestion() {
  const cls = document.getElementById("class").value;
  const subject = document.getElementById("subject").value;
  const chapter = document.getElementById("chapter").value;
  const text = document.getElementById("questionText").value;
  const marks = document.getElementById("marks").value;

  if (!cls || !subject || !chapter || !text || !marks) {
    alert("Fill all fields");
    return;
  }

  const q = { cls, subject, chapter, text, marks };

  if (editId) {
    await fetch(`${BASE_URL}/update-question/${editId}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(q)
    });
    alert("Updated ✅");
    editId = null;
  } else {
    await fetch(`${BASE_URL}/add-question`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(q)
    });
    alert("Added ✅");
  }

  clearForm();
  loadQuestions();
}

// LOAD
async function loadQuestions() {
  const res = await fetch(`${BASE_URL}/questions`);
  const data = await res.json();

  const list = document.getElementById("questionList");
  list.innerHTML = "";

  data.forEach((q) => {
    list.innerHTML += `
      <div class="card">
        <b>${q.cls} | ${q.subject} | ${q.marks} marks</b>
        <br>${q.text}
        <br><br>
        <button onclick="editQuestion('${q._id}')">Edit ✏️</button>
        <button onclick="deleteQuestion('${q._id}')">Delete ❌</button>
      </div>
    `;
  });
}

// DELETE
async function deleteQuestion(id) {
  if (!confirm("Delete this question?")) return;

  await fetch(`${BASE_URL}/delete-question/${id}`, {
    method: "DELETE"
  });

  loadQuestions();
}

// EDIT
async function editQuestion(id) {
  const res = await fetch(`${BASE_URL}/questions`);
  const data = await res.json();

  const q = data.find(item => item._id === id);

  document.getElementById("class").value = q.cls;
  document.getElementById("subject").value = q.subject;
  document.getElementById("chapter").value = q.chapter;
  document.getElementById("questionText").value = q.text;
  document.getElementById("marks").value = q.marks;

  editId = id;
}

// CLEAR FORM
function clearForm() {
  document.getElementById("class").value = "";
  document.getElementById("subject").value = "";
  document.getElementById("chapter").value = "";
  document.getElementById("questionText").value = "";
  document.getElementById("marks").value = "";
}

</script>

</body>
</html>
