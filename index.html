<!DOCTYPE html>
<html>
<head>
  <title>Exam App</title>
  <style>
    body { font-family: Arial; }
    #dashboard { display: none; }
    .menu { width: 200px; float: left; }
    .menu button { display: block; width: 100%; margin: 5px 0; }
    .content { margin-left: 210px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2>School Login</h2>

  <input type="email" id="email" placeholder="Enter Email" />
  <br><br>

  <input type="password" id="password" placeholder="Enter Password" />
  <br><br>

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <h2>Dashboard</h2>

  <div class="menu">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('students')">Students</button>
    <button onclick="showPage('question')">Question Bank</button>
    <button onclick="showPage('paper')">Paper Generator</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">
    <div id="home">Welcome to Dashboard 🎉</div>

    <div id="students" style="display:none;">
      <h3>Students</h3>
      <p>Add student system coming...</p>
    </div>

    <div id="question" style="display:none;">
      <h3>Question Bank</h3>
      <p>Question system coming...</p>
    </div>

    <div id="paper" style="display:none;">
      <h3>Paper Generator</h3>
      <p>Paper generator coming...</p>
    </div>
  </div>

</div>

<script>
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (email === "admin@test.com" && password === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    document.getElementById("msg").innerText = "Invalid login ❌";
  }
}

function logout() {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("login").style.display = "block";
}

function showPage(page) {
  document.getElementById("home").style.display = "none";
  document.getElementById("students").style.display = "none";
  document.getElementById("question").style.display = "none";
  document.getElementById("paper").style.display = "none";

  document.getElementById(page).style.display = "block";
}
</script>

</body>
</html>
