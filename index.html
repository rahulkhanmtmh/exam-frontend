<!DOCTYPE html>
<html>
<head>
  <title>Exam App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #87CEEB; /* sky blue */
    }

    #login, #dashboard {
      padding: 20px;
    }

    /* Login Box */
    #login {
      max-width: 300px;
      margin: 100px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      width: 95%;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    /* Dashboard */
    #dashboard {
      display: none;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: #ffffff;
      position: fixed;
      padding: 10px;
    }

    .sidebar h3 {
      text-align: center;
      color: #007BFF;
    }

    .sidebar button {
      margin: 10px 0;
      width: 100%;
      background: #f0f0f0;
      color: black;
    }

    .sidebar button:hover {
      background: #007BFF;
      color: white;
    }

    .content {
      margin-left: 240px;
      padding: 20px;
      background: white;
      min-height: 100vh;
      border-radius: 10px;
    }
    textarea {
  width: 90%;
  height: 80px;
  margin: 5px;
  padding: 10px;
}
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>School Login</h2>

  <input type="email" id="email" placeholder="Enter Email" />
  <input type="password" id="password" placeholder="Enter Password" />

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="sidebar">
    <h3>Exam App</h3>

    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('students')">Students</button>
    <button onclick="showPage('question')">Question Bank</button>
    <button onclick="showPage('paper')">Paper Generator</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">

    <div id="home">
      <h2>Welcome 🎉</h2>
      <p>This is your dashboard</p>
    </div>

    <div id="students" style="display:none;">
      <h2>Students</h2>
      <p>Student system coming...</p>
    </div>

<div id="question" style="display:none;">
  <h2>Question Bank</h2>

  <input type="text" id="class" placeholder="Class" />
  <input type="text" id="subject" placeholder="Subject" />
  <input type="text" id="chapter" placeholder="Chapter" />

  <textarea id="questionText" placeholder="Enter Question"></textarea>

  <input type="number" id="marks" placeholder="Marks" />

  <button onclick="addQuestion()">Add Question</button>

  <h3>Saved Questions</h3>
  <div id="questionList"></div>
</div>

    <div id="paper" style="display:none;">
      <h2>Paper Generator</h2>
      <p>Paper generator coming...</p>
    </div>

  </div>

</div>

<script>

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (email === "admin@test.com" && password === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    document.getElementById("msg").innerText = "Invalid login ❌";
  }
}

function logout() {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("login").style.display = "block";
}

function showPage(page) {
  document.getElementById("home").style.display = "none";
  document.getElementById("students").style.display = "none";
  document.getElementById("question").style.display = "none";
  document.getElementById("paper").style.display = "none";

  document.getElementById(page).style.display = "block";

  if (page === "question") {
    loadQuestions();
  }
}

async function addQuestion() {
  const cls = document.getElementById("class").value;
  const subject = document.getElementById("subject").value;
  const chapter = document.getElementById("chapter").value;
  const text = document.getElementById("questionText").value;
  const marks = document.getElementById("marks").value;

  if (!cls || !subject || !chapter || !text || !marks) {
    alert("Fill all fields");
    return;
  }

  const q = { cls, subject, chapter, text, marks };

  await fetch("https://exam-backend-cu62.onrender.com/add-question", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(q)
  });

  loadQuestions();
}

async function loadQuestions() {
  const res = await fetch("https://exam-backend-cu62.onrender.com/questions");
  const data = await res.json();

  const list = document.getElementById("questionList");
  list.innerHTML = "";

  data.forEach(q => {
    list.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:5px;">
        <b>Class:</b> ${q.cls} |
        <b>Subject:</b> ${q.subject} |
        <b>Marks:</b> ${q.marks}
        <br>
        <b>Q:</b> ${q.text}
      </div>
    `;
  });
}
  
</script>

</body>
</html>
