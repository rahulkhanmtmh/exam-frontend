<!DOCTYPE html>
<html>
<head>
  <title>Exam App</title>

  <style>
    body { margin:0; font-family: Arial; background:#87CEEB; }
    #login,#dashboard { padding:20px; }
    #login {
      max-width:300px; margin:100px auto; background:white;
      padding:20px; border-radius:10px; text-align:center;
    }
    input,textarea {
      width:90%; padding:10px; margin:5px;
      border-radius:5px; border:1px solid #ccc;
    }
    button {
      padding:10px; width:95%; background:#007BFF;
      color:white; border:none; border-radius:5px;
      cursor:pointer;
    }
    button:hover { background:#0056b3; }
    #dashboard { display:none; }
    .sidebar {
      width:220px; height:100vh; background:white;
      position:fixed; padding:10px;
    }
    .content {
      margin-left:240px; padding:20px;
      background:white; min-height:100vh;
      border-radius:10px;
    }
    .card {
      border:1px solid #ccc; padding:10px;
      margin:5px; border-radius:5px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>School Login</h2>
  <input type="text" id="school" placeholder="School Name (Register only)" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="sidebar">
    <h3>Exam App</h3>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('question')">Question Bank</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">

    <div id="home">
      <h2>Welcome 🎉</h2>
    </div>

    <div id="question" style="display:none;">
      <h2>Question Bank</h2>

      <input type="text" id="class" placeholder="Class" />
      <input type="text" id="subject" placeholder="Subject" />
      <input type="text" id="chapter" placeholder="Chapter" />

      <textarea id="questionText" placeholder="Enter Question"></textarea>

      <!-- MCQ -->
      <input type="text" id="optA" placeholder="Option A" />
      <input type="text" id="optB" placeholder="Option B" />
      <input type="text" id="optC" placeholder="Option C" />
      <input type="text" id="optD" placeholder="Option D" />

      <input type="number" id="marks" placeholder="Marks" />

      <!-- OCR -->
      <input type="file" id="imageInput" />
      <button onclick="uploadImage()">Scan Image 📷</button>

      <button onclick="addQuestion()">Save Question</button>

      <h3>Saved Questions</h3>
      <div id="questionList"></div>
    </div>

  </div>
</div>

<script>

const BASE_URL = "https://exam-backend-cu62.onrender.com";
let editId = null;

// AUTO LOGIN
window.onload = () => {
  const token = localStorage.getItem("token");
  if (token) {
    loginUI();
    loadQuestions();
  }
};

function loginUI() {
  document.getElementById("login").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}

// REGISTER
async function register() {
  const res = await fetch(`${BASE_URL}/register`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      schoolName:school.value,
      email:email.value,
      password:password.value
    })
  });
  const data = await res.json();
  msg.innerText = data.message;
}

// LOGIN
async function login() {
  const res = await fetch(`${BASE_URL}/login`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });
  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    loginUI();
    loadQuestions();
  } else {
    msg.innerText = data.message;
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

// PAGE
function showPage(p) {
  home.style.display="none";
  question.style.display="none";
  document.getElementById(p).style.display="block";
  if(p==="question") loadQuestions();
}

// ADD / UPDATE
async function addQuestion() {
  const token = localStorage.getItem("token");

  const q = {
    cls:class.value,
    subject:subject.value,
    chapter:chapter.value,
    text:questionText.value,
    marks:marks.value,
    options:{
      A:optA.value,
      B:optB.value,
      C:optC.value,
      D:optD.value
    }
  };

  if(editId){
    await fetch(`${BASE_URL}/update-question/${editId}`,{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      },
      body:JSON.stringify(q)
    });
    alert("Updated ✅");
    editId=null;
  } else {
    await fetch(`${BASE_URL}/add-question`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
      },
      body:JSON.stringify(q)
    });
    alert("Saved ✅");
  }

  clearForm();
  loadQuestions();
}

// LOAD
async function loadQuestions() {
  const token = localStorage.getItem("token");

  const res = await fetch(`${BASE_URL}/questions`,{
    headers:{ "Authorization":"Bearer "+token }
  });

  if(res.status===401){
    alert("Session expired");
    logout();
    return;
  }

  const data = await res.json();
  questionList.innerHTML="";

  if(!data.length){
    questionList.innerHTML="<p>No questions</p>";
    return;
  }

  data.forEach(q=>{
    questionList.innerHTML+=`
    <div class="card">
      <b>${q.cls} | ${q.subject} | ${q.marks} marks</b><br>
      ${q.text}<br>
      A. ${q.options?.A||""}<br>
      B. ${q.options?.B||""}<br>
      C. ${q.options?.C||""}<br>
      D. ${q.options?.D||""}<br><br>
      <button onclick="editQuestion('${q._id}')">Edit</button>
      <button onclick="deleteQuestion('${q._id}')">Delete</button>
    </div>`;
  });
}

// DELETE
async function deleteQuestion(id){
  const token = localStorage.getItem("token");
  if(!confirm("Delete?")) return;

  await fetch(`${BASE_URL}/delete-question/${id}`,{
    method:"DELETE",
    headers:{ "Authorization":"Bearer "+token }
  });

  loadQuestions();
}

// EDIT
async function editQuestion(id){
  const token = localStorage.getItem("token");

  const res = await fetch(`${BASE_URL}/questions`,{
    headers:{ "Authorization":"Bearer "+token }
  });

  const data = await res.json();
  const q = data.find(x=>x._id===id);

  class.value=q.cls;
  subject.value=q.subject;
  chapter.value=q.chapter;
  questionText.value=q.text;
  marks.value=q.marks;

  optA.value=q.options?.A||"";
  optB.value=q.options?.B||"";
  optC.value=q.options?.C||"";
  optD.value=q.options?.D||"";

  editId=id;
}

// OCR + MCQ
async function uploadImage(){
  const file=imageInput.files[0];
  const token=localStorage.getItem("token");

  if(!file){ alert("Select image"); return; }

  const fd=new FormData();
  fd.append("image",file);

  const res=await fetch(`${BASE_URL}/ocr`,{
    method:"POST",
    headers:{ "Authorization":"Bearer "+token },
    body:fd
  });

  const data=await res.json();

  const parsed=parseMCQ(data.text);

  questionText.value=parsed.question;
  optA.value=parsed.options.A;
  optB.value=parsed.options.B;
  optC.value=parsed.options.C;
  optD.value=parsed.options.D;
}

// PARSER
function parseMCQ(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(l=>l);

  let q="";
  let opt={A:"",B:"",C:"",D:""};

  lines.forEach(l=>{
    if(/^A[\.\)]/i.test(l)) opt.A=l.replace(/^A[\.\)]/i,"").trim();
    else if(/^B[\.\)]/i.test(l)) opt.B=l.replace(/^B[\.\)]/i,"").trim();
    else if(/^C[\.\)]/i.test(l)) opt.C=l.replace(/^C[\.\)]/i,"").trim();
    else if(/^D[\.\)]/i.test(l)) opt.D=l.replace(/^D[\.\)]/i,"").trim();
    else q+=l+" ";
  });

  return {question:q.trim(),options:opt};
}

// CLEAR
function clearForm(){
  class.value="";
  subject.value="";
  chapter.value="";
  questionText.value="";
  marks.value="";
  optA.value="";
  optB.value="";
  optC.value="";
  optD.value="";
}

</script>

</body>
</html>
