<!DOCTYPE html>
<html>
<head>
  <title>Exam App - Paper Generator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    #login, #dashboard {
      padding: 20px;
    }

    /* Login Box */
    #login {
      max-width: 300px;
      margin: 100px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      width: 95%;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    /* Dashboard */
    #dashboard {
      display: none;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: #ffffff;
      position: fixed;
      padding: 10px;
    }

    .sidebar h3 {
      text-align: center;
      color: #007BFF;
    }

    .sidebar button {
      margin: 10px 0;
      width: 100%;
      background: #f0f0f0;
      color: black;
    }

    .sidebar button:hover {
      background: #007BFF;
      color: white;
    }

    .content {
      margin-left: 240px;
      padding: 20px;
      background: white;
      min-height: 100vh;
      border-radius: 10px;
    }

    textarea {
      width: 90%;
      height: 80px;
      margin: 5px;
      padding: 10px;
    }

    /* Paper Generator styles */
    .paper-controls {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .paper-controls select, .paper-controls input {
      width: auto;
      padding: 8px;
      margin: 0 10px 0 0;
    }

    .paper-controls button {
      width: auto;
      padding: 8px 20px;
    }

    .paper {
      border: 1px solid #ddd;
      padding: 20px;
      background: white;
      border-radius: 8px;
      margin-top: 20px;
    }

    .paper h3 {
      text-align: center;
      margin-bottom: 20px;
    }

    .question-item {
      margin: 15px 0;
      padding: 10px;
      border-bottom: 1px dashed #ccc;
    }

    .question-text {
      font-size: 16px;
      margin-bottom: 5px;
    }

    .question-marks {
      font-size: 14px;
      color: #666;
      font-style: italic;
    }

    .total-marks {
      margin-top: 20px;
      font-weight: bold;
      text-align: right;
    }

    @media print {
      .sidebar, .paper-controls, button {
        display: none;
      }
      .content {
        margin-left: 0;
      }
      .paper {
        border: none;
      }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>School Login</h2>
  <input type="email" id="email" placeholder="Enter Email" />
  <input type="password" id="password" placeholder="Enter Password" />
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="sidebar">
    <h3>Exam App</h3>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('students')">Students</button>
    <button onclick="showPage('question')">Question Bank</button>
    <button onclick="showPage('paper')">Paper Generator</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">
    <div id="home">
      <h2>Welcome 🎉</h2>
      <p>This is your dashboard</p>
    </div>

    <div id="students" style="display:none;">
      <h2>Students</h2>
      <p>Student system coming...</p>
    </div>

    <div id="question" style="display:none;">
      <h2>Question Bank</h2>
      <input type="text" id="class" placeholder="Class" />
      <input type="text" id="subject" placeholder="Subject" />
      <input type="text" id="chapter" placeholder="Chapter" />
      <textarea id="questionText" placeholder="Enter Question"></textarea>
      <input type="number" id="marks" placeholder="Marks" />
      <button onclick="addQuestion()">Add Question</button>
      <h3>Saved Questions</h3>
      <div id="questionList"></div>
    </div>

    <div id="paper" style="display:none;">
      <h2>Paper Generator</h2>
      <div class="paper-controls">
        <label>Class:</label>
        <select id="paperClass">
          <option value="">All Classes</option>
        </select>

        <label>Subject:</label>
        <select id="paperSubject">
          <option value="">All Subjects</option>
        </select>

        <label>Number of Questions:</label>
        <input type="number" id="numQuestions" value="5" min="1" style="width: 80px;">

        <button onclick="generatePaper()">Generate Paper</button>
        <button onclick="printPaper()" style="background: #28a745;">Print Paper</button>
      </div>

      <div id="paperOutput" class="paper">
        <!-- Generated paper will appear here -->
      </div>
    </div>
  </div>
</div>

<script>
// ==================== Global variables ====================
let editId = null;
let allQuestions = []; // cache for paper generator

// ==================== Login / Logout ====================
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  if (email === "admin@test.com" && password === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    document.getElementById("msg").innerText = "Invalid login ❌";
  }
}

function logout() {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("login").style.display = "block";
}

// ==================== Page Navigation ====================
function showPage(page) {
  document.getElementById("home").style.display = "none";
  document.getElementById("students").style.display = "none";
  document.getElementById("question").style.display = "none";
  document.getElementById("paper").style.display = "none";
  document.getElementById(page).style.display = "block";

  if (page === "question") {
    loadQuestions();
  }
  if (page === "paper") {
    loadPaperData();  // load questions and populate filters
  }
}

// ==================== Question Bank Functions ====================
async function addQuestion() {
  const cls = document.getElementById("class").value;
  const subject = document.getElementById("subject").value;
  const chapter = document.getElementById("chapter").value;
  const text = document.getElementById("questionText").value;
  const marks = document.getElementById("marks").value;

  if (!cls || !subject || !chapter || !text || !marks) {
    alert("Fill all fields");
    return;
  }

  const q = { cls, subject, chapter, text, marks: parseInt(marks) };

  if (editId !== null) {
    await fetch(`https://exam-backend-cu62.onrender.com/update-question/${editId}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(q)
    });
    alert("Updated ✅");
    editId = null;
  } else {
    await fetch("https://exam-backend-cu62.onrender.com/add-question", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(q)
    });
    alert("Added ✅");
  }

  loadQuestions();

  // clear fields
  document.getElementById("class").value = "";
  document.getElementById("subject").value = "";
  document.getElementById("chapter").value = "";
  document.getElementById("questionText").value = "";
  document.getElementById("marks").value = "";
}

async function loadQuestions() {
  const res = await fetch("https://exam-backend-cu62.onrender.com/questions");
  const data = await res.json();

  const list = document.getElementById("questionList");
  list.innerHTML = "";

  data.forEach((q) => {
    list.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:5px;">
        <b>Class:</b> ${q.cls} |
        <b>Subject:</b> ${q.subject} |
        <b>Marks:</b> ${q.marks}
        <br>
        <b>Q:</b> ${q.text}
        <br><br>
        <button onclick="editQuestion('${q._id}')">Edit ✏️</button>
        <button onclick="deleteQuestion('${q._id}')">Delete ❌</button>
      </div>
    `;
  });
}

async function deleteQuestion(id) {
  const confirmDelete = confirm("Delete this question?");
  if (!confirmDelete) return;
  await fetch(`https://exam-backend-cu62.onrender.com/delete-question/${id}`, { method: "DELETE" });
  loadQuestions();
}

function editQuestion(id) {
  fetch("https://exam-backend-cu62.onrender.com/questions")
    .then(res => res.json())
    .then(data => {
      const q = data.find(question => question._id === id);
      document.getElementById("class").value = q.cls;
      document.getElementById("subject").value = q.subject;
      document.getElementById("chapter").value = q.chapter;
      document.getElementById("questionText").value = q.text;
      document.getElementById("marks").value = q.marks;
      editId = id;
    });
}

// ==================== Paper Generator Functions ====================
async function loadPaperData() {
  // fetch all questions for filter generation and caching
  const res = await fetch("https://exam-backend-cu62.onrender.com/questions");
  allQuestions = await res.json();

  // populate class dropdown
  const classSet = new Set();
  const subjectSet = new Set();
  allQuestions.forEach(q => {
    classSet.add(q.cls);
    subjectSet.add(q.subject);
  });

  const classSelect = document.getElementById("paperClass");
  classSelect.innerHTML = '<option value="">All Classes</option>';
  Array.from(classSet).sort().forEach(cls => {
    classSelect.innerHTML += `<option value="${cls}">${cls}</option>`;
  });

  const subjectSelect = document.getElementById("paperSubject");
  subjectSelect.innerHTML = '<option value="">All Subjects</option>';
  Array.from(subjectSet).sort().forEach(sub => {
    subjectSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
  });
}

function generatePaper() {
  const selectedClass = document.getElementById("paperClass").value;
  const selectedSubject = document.getElementById("paperSubject").value;
  let numQuestions = parseInt(document.getElementById("numQuestions").value) || 5;

  // Filter questions
  let filtered = allQuestions;
  if (selectedClass) {
    filtered = filtered.filter(q => q.cls === selectedClass);
  }
  if (selectedSubject) {
    filtered = filtered.filter(q => q.subject === selectedSubject);
  }

  if (filtered.length === 0) {
    document.getElementById("paperOutput").innerHTML = "<p style='color:red;'>No questions found for the selected criteria.</p>";
    return;
  }

  // Randomly select `numQuestions` distinct questions
  if (numQuestions > filtered.length) {
    numQuestions = filtered.length;
    alert(`Only ${filtered.length} questions available. Using all.`);
  }

  // Shuffle and take first N
  const shuffled = [...filtered];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const selected = shuffled.slice(0, numQuestions);

  // Build paper HTML
  let html = `<h3>Exam Paper</h3>`;
  if (selectedClass) html += `<p><strong>Class:</strong> ${selectedClass}</p>`;
  if (selectedSubject) html += `<p><strong>Subject:</strong> ${selectedSubject}</p>`;
  html += `<hr>`;

  let totalMarks = 0;
  selected.forEach((q, idx) => {
    totalMarks += q.marks;
    html += `
      <div class="question-item">
        <div class="question-text"><strong>${idx+1}.</strong> ${q.text}</div>
        <div class="question-marks">[${q.marks} marks]</div>
        <div style="margin-top: 20px;">&nbsp;</div> <!-- space for answer -->
      </div>
    `;
  });
  html += `<div class="total-marks">Total Marks: ${totalMarks}</div>`;

  document.getElementById("paperOutput").innerHTML = html;
}

function printPaper() {
  const printContents = document.getElementById("paperOutput").innerHTML;
  const originalTitle = document.title;
  document.title = "Exam Paper";
  const printWindow = window.open('', '_blank');
  printWindow.document.write(`
    <html>
      <head>
        <title>Exam Paper</title>
        <style>
          body { font-family: Arial, sans-serif; padding: 20px; }
          .question-item { margin: 20px 0; }
          .question-text { font-size: 16px; }
          .question-marks { font-size: 14px; color: #666; }
          .total-marks { margin-top: 30px; font-weight: bold; text-align: right; }
          @media print { body { margin: 0; } }
        </style>
      </head>
      <body>${printContents}</body>
    </html>
  `);
  printWindow.document.close();
  printWindow.print();
  document.title = originalTitle;
}
</script>

</body>
</html>
